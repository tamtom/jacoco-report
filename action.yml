name: 'JaCoCo Report'
description: 'Publishes the JaCoCo report as a comment in the Pull Request'
inputs:
  paths:
    description: 'Comma separated paths of the generated jacoco xml files (supports wildcard glob pattern)'
    required: true
  base-path:
    description: 'Base report path to be used for relative path calculation'
    required: true
  token:
    description: 'Github personal token to add comments to Pull Request'
    required: true
  min-coverage-overall:
    description: 'The minimum code coverage that is required to pass for overall project'
    required: false
    default: '80'
  min-coverage-changed-files:
    description: 'The minimum code coverage that is required to pass for changed files'
    required: false
    default: '80'
  title:
    description: 'Optional title for the Pull Request comment'
    required: false
  update-comment:
    description: 'Update the coverage report comment instead of creating new ones. Requires title to works properly.'
    required: false
    default: 'false'
  comment-type:
    description: 'Specifies where to add the comment, whether as a PR comment, workflow summary, or both.'
    required: false
    default: 'pr_comment'
    options:
      - 'pr_comment'
      - 'summary'
      - 'both'
  pr-number:
    description: 'The PR number to add the comment to. If not provided, the action will try to get it from the environment.'
    required: false
  skip-if-no-changes:
    description: "Comment won't be added if there is no coverage information present for the files changed"
    required: false
    default: 'false'
  pass-emoji:
    description: 'Github emoji to use for pass status shown when coverage greater than min coverage (should be a Github supported emoji)'
    required: false
    default: ':green_apple:'
  fail-emoji:
    description: 'Github emoji to use for fail status shown when coverage lesser than min coverage (should be a Github supported emoji)'
    required: false
    default: ':x:'
  continue-on-error:
    description: 'When there is an error do not fail the action, but log a warning'
    required: false
    default: 'true'
  debug-mode:
    description: 'Run the action in debug mode and get debug logs printed in console'
    required: false
    default: 'false'
  max-overall-drop:
    description: 'Maximum allowed drop in overall project coverage vs base (percentage points). 0 disables.'
    required: false
    default: '1.0'
  max-file-drop:
    description: 'Maximum allowed drop in a single changed file vs base (percentage points). 0 disables.'
    required: false
    default: '1.0'
  fail-on-uncovered-new-file:
    description: 'Fail when a new source file is added with zero covered lines.'
    required: false
    default: 'true'
  fail-on-overall-drop:
    description: |
      Fail when overall project coverage drops by more than max-overall-drop.
      Default false because aggregate totals can swing for reasons outside the
      PR (baseline freshness, partial test execution on base branch, build
      cache state). Per-file gates already catch the cases this is meant to.
      The overall delta is still surfaced in the comment for visibility.
    required: false
    default: 'false'
  request-changes-on-regression:
    description: 'Submit a REQUEST_CHANGES review on the PR when a regression is detected.'
    required: false
    default: 'true'

outputs:
  coverage-overall:
    description: 'The overall coverage of the project'
  coverage-changed-files:
    description: 'The total coverage of all changed files'
  coverage-regressed:
    description: 'true if any regression was detected (new uncovered file, file drop, or overall drop)'
  regression-summary:
    description: 'Short multi-line summary of regressions, suitable for logs or comments'

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'percent'
  color: 'green'
